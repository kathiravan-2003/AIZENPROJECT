<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aizen Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#05010d;
overflow:hidden;
}

/* background glow */

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:radial-gradient(circle,#8c3cff55,transparent);
filter:blur(100px);
}

.login-box{

width:420px;

padding:40px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(168,85,255,.3);

border-radius:30px;

box-shadow:
0 0 30px #8c3cff66;

z-index:1;
}

h1{

text-align:center;

margin-bottom:30px;

color:#d8b4ff;

text-shadow:
0 0 15px #a855ff;
}

.input-box{

margin-bottom:20px;
}

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(168,85,255,.3);

color:white;

font-size:16px;

box-shadow:
0 0 15px rgba(140,60,255,.2);

}

input::placeholder{

color:#f3d9ff;

text-shadow:
0 0 10px white;
}

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

cursor:pointer;

font-size:18px;

font-weight:bold;

background:linear-gradient(
45deg,
#7b2cff,
#d66bff
);

color:white;

margin-top:10px;

box-shadow:
0 0 25px #8c3cff;
}

button:hover{

transform:translateY(-3px);

box-shadow:
0 0 40px #a855ff;
}

#error{

margin-top:15px;
text-align:center;
color:#ff4d6d;
}

</style>
</head>
<body>

<div class="login-box">

<h1>Aizen Login</h1>

<div class="input-box">
<input
type="text"
id="username"
placeholder="Enter Username"
autocomplete="off"
>
</div>

<div class="input-box">
<input
type="password"
id="password"
placeholder="Enter Password"
autocomplete="new-password"
>
</div>

<button onclick="login()">
Enter Soul Society
</button>

<p id="error"></p>

</div>

<script>

function login(){

const user =
document.getElementById("username").value;

const pass =
document.getElementById("password").value;

/* change username/password */

if(
user==="aizen"
&&
pass==="12345"
){
espadaApproved(user);

setTimeout(()=>{
    window.location.href="Aizenwebpage.html";
},1000);

}
else{

document.getElementById(
"error"
).innerText=
"Invalid Username or Password";

}

}
function espadaApproved(username){

    if(Notification.permission === "granted"){
        new Notification("Espada Team 🔥", {
            body: username + " is now officially approved into Espada!",
            icon: "https://i.imgur.com/your-icon.png"
        });
    }

    console.log(username + " approved into Espada");
}
window.onload = function(){

document.getElementById("username").value = "";
document.getElementById("password").value = "";

if(Notification.permission !== "granted"){
        Notification.requestPermission();
    }
}


</script>

</body>
</html>
